<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Canva Embed Demo</title>
  </head>
  <body>
    <h1>Canva Embed Demo</h1>
    <div id="canva-root" style="width:100%;height:600px;border:1px solid #ddd"></div>

    <!-- Replace the placeholder below with your real Canva embed script URL -->
    <script>
      const EMBED_SCRIPT_URL = '%%CANVA_EMBED_SCRIPT_URL%%';
      if (EMBED_SCRIPT_URL === '%%CANVA_EMBED_SCRIPT_URL%%') {
        document.getElementById('canva-root').innerText = 'Set CANVA_EMBED_SCRIPT_URL in .env or replace the placeholder in this file.';
      } else {
        const s = document.createElement('script');
        s.src = EMBED_SCRIPT_URL;
        s.onload = () => {
          console.log('Canva embed script loaded — initialize per Canva docs');
        };
        document.body.appendChild(s);
      }
    </script>
  </body>
</html>
